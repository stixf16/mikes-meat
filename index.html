<title>Mike's Meat &mdash; Recipe Scaler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --scarlet:#E31837; --scarlet-dark:#A03123; --scarlet-deep:#7d1710;
    --ink:#151412; --ink-soft:#33302c; --gray:#9FA1A4; --gray-dark:#6A737B;
    --paper:#f6f4f1; --card:#ffffff; --line:#e4ded6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
  .screen{display:none;min-height:100vh;min-height:100dvh;}
  .screen.active{display:block;}

  /* ---- shared header band ---- */
  .band{
    background:linear-gradient(160deg,var(--scarlet) 0%,var(--scarlet-dark) 60%,var(--scarlet-deep) 100%);
    color:#fff;padding:calc(env(safe-area-inset-top) + 20px) 20px 22px;
    position:relative;overflow:hidden;
  }
  .band::before{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(180deg,rgba(255,255,255,.05) 0 22px,transparent 22px 44px);opacity:.4;}
  .band-inner{position:relative;z-index:2;}

  /* ---- HOME ---- */
  .home-head{text-align:center;}
  .home-head img{width:132px;max-width:44vw;height:auto;filter:drop-shadow(0 10px 20px rgba(0,0,0,.35));margin-bottom:2px;}
  .home-head .eyebrow{font-family:"Oswald";font-weight:600;letter-spacing:.3em;text-transform:uppercase;font-size:11px;color:#ffd9d0;margin:0;}
  .home-head h1{font-family:"Anton";font-weight:400;text-transform:uppercase;font-size:clamp(30px,9vw,46px);line-height:.9;margin:2px 0 3px;text-shadow:0 3px 0 rgba(0,0,0,.18);}
  .home-head .sub{font-family:"Oswald";font-weight:500;text-transform:uppercase;letter-spacing:.14em;font-size:12.5px;margin:0;opacity:.95;}

  .list{padding:18px 16px calc(env(safe-area-inset-bottom) + 40px);max-width:640px;margin:0 auto;}
  .rcard{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:16px 18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;
    box-shadow:0 10px 24px -20px rgba(20,20,18,.5);cursor:pointer;transition:transform .06s ease;
  }
  .rcard:active{transform:scale(.985);}
  .rcard .idx{
    flex:0 0 auto;width:44px;height:44px;border-radius:12px;
    background:linear-gradient(180deg,var(--scarlet),var(--scarlet-dark));color:#fff;
    font-family:"Anton";font-size:22px;display:flex;align-items:center;justify-content:center;
  }
  .rcard .meta{flex:1;min-width:0;}
  .rcard .meta h3{font-family:"Oswald";font-weight:600;text-transform:uppercase;letter-spacing:.02em;font-size:17px;margin:0;line-height:1.1;}
  .rcard .meta p{margin:2px 0 0;font-size:12.5px;color:var(--gray-dark);}
  .rcard .arw{color:var(--scarlet);font-size:22px;font-weight:700;flex:0 0 auto;}
  .rcard.empty{border-style:dashed;background:#faf8f5;box-shadow:none;}
  .rcard.empty .idx{background:#d9d3cb;color:#fff;}
  .rcard.empty .meta h3{color:var(--gray-dark);}
  .rcard.empty .arw{color:var(--gray);}

  /* ---- RECIPE VIEW ---- */
  .topbar{display:flex;align-items:center;gap:12px;}
  .back{
    appearance:none;border:0;background:rgba(0,0,0,.22);color:#fff;
    width:40px;height:40px;border-radius:11px;font-size:20px;line-height:1;cursor:pointer;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.3);
  }
  .topbar .tt{min-width:0;}
  .topbar .logo{margin-left:auto;margin-right:34px;flex:0 0 auto;height:74px;width:auto;filter:drop-shadow(0 6px 12px rgba(0,0,0,.35));}
  .topbar .tt h2{font-family:"Anton";font-weight:400;text-transform:uppercase;font-size:clamp(22px,6.5vw,32px);line-height:.95;margin:0;text-shadow:0 2px 0 rgba(0,0,0,.16);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topbar .tt p{margin:1px 0 0;font-family:"Oswald";text-transform:uppercase;letter-spacing:.1em;font-size:11px;opacity:.9;}

  .body{max-width:640px;margin:0 auto;padding:16px 16px calc(env(safe-area-inset-bottom) + 48px);}

  .scaler{
    background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:16px;
    box-shadow:0 10px 24px -20px rgba(20,20,18,.5);
  }
  .scaler .lab{font-family:"Oswald";font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:12.5px;color:var(--scarlet-dark);margin:0 0 10px;}
  .stepper{display:flex;align-items:stretch;gap:10px;}
  .stepper button{
    width:56px;flex:0 0 auto;border:0;border-radius:13px;font-size:28px;font-weight:700;color:#fff;cursor:pointer;
    background:linear-gradient(180deg,var(--scarlet),var(--scarlet-dark));box-shadow:0 6px 14px -6px rgba(227,24,55,.6);
    display:flex;align-items:center;justify-content:center;line-height:1;
  }
  .stepper button:active{transform:scale(.94);}
  .stepper .valwrap{flex:1;position:relative;}
  .stepper input{
    width:100%;height:100%;text-align:center;border:2px solid var(--line);border-radius:13px;
    font-family:"Anton";font-size:34px;color:var(--ink);background:#fbfaf8;padding:6px 6px 22px;
  }
  .stepper input:focus{outline:0;border-color:var(--scarlet);}
  .stepper .unit{position:absolute;left:0;right:0;bottom:8px;text-align:center;font-family:"Oswald";
    text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:var(--gray-dark);pointer-events:none;}
  .quick{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .quick button{
    border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;
    font-family:"Oswald";font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:12px;color:var(--ink-soft);cursor:pointer;
  }
  .quick button.on{background:var(--scarlet);color:#fff;border-color:var(--scarlet);}

  .ing-head{font-family:"Oswald";font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:12px;color:var(--gray-dark);margin:4px 4px 8px;display:flex;justify-content:space-between;}
  .ing{
    background:var(--card);border:1px solid var(--line);
    border-radius:13px;padding:14px 16px;margin-bottom:9px;box-shadow:0 8px 20px -20px rgba(20,20,18,.5);
    line-height:1.3;
  }
  .ing .meas{font-family:"Oswald";font-weight:700;font-size:19px;color:var(--ink);margin-right:6px;}
  .ing .nm{font-family:"Oswald";font-weight:600;font-size:19px;color:var(--scarlet-dark);}

  .notes{margin-top:16px;background:#f3f5f6;border-left:5px solid var(--gray-dark);border-radius:12px;padding:14px 16px;font-size:13.5px;color:var(--ink-soft);}
  .notes .k{font-family:"Oswald";font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:var(--gray-dark);margin-bottom:4px;}

  .empty-state{text-align:center;padding:50px 24px;color:var(--gray-dark);}
  .empty-state .big{font-family:"Anton";font-size:30px;color:var(--scarlet-dark);text-transform:uppercase;margin-bottom:8px;}
  .empty-state code{background:#efece7;padding:2px 6px;border-radius:5px;font-size:12.5px;}

  .foot{text-align:center;color:var(--gray);font-size:11px;padding:8px 0 calc(env(safe-area-inset-bottom) + 20px);font-family:"Oswald";letter-spacing:.06em;text-transform:uppercase;}
</style>
</head>

  <div class="body" id="recipeBody"></div>
</div>

<script>
/* ============================================================
   MIKE'S MEAT — RECIPES
   Add / edit recipes here. Amounts are the BASE batch.
   baseScale = the number that "1x" represents (e.g. 3 lbs meat).
   Change the scale in the app and every amount recalculates.
   ============================================================ */
var RECIPES = [
  {
    id:"og-jerky",
    name:"The Original",
    subtitle:"Mike's OG jerky marinade",
    scaleLabel:"lbs of meat",
    baseScale:3,          // base recipe = 3 lbs of meat
    step:1,               // + / - button increment
    quick:[3,6,9,12,69,100,200], // quick-pick batch sizes
    ingredients:[
      {item:"Meat",                amount:3,      unit:"lb"},
      {item:"Salt",                amount:1,      unit:"Tbsp"},
      {item:"Pepper",              amount:0.5,    unit:"tsp"},
      {item:"Worcestershire sauce",amount:1/3,    unit:"cup"},
      {item:"Soy sauce",           amount:0.25,   unit:"cup"},
      {item:"Onion powder",        amount:1,      unit:"tsp"},
      {item:"Garlic powder",       amount:1,      unit:"tsp"}
    ]
  },
  { id:"r2", name:"Texas",        placeholder:true },
  { id:"r3", name:"Lime Tajin",   placeholder:true },
  { id:"r4", name:"Salt & Pepper",placeholder:true },
  { id:"r5", name:"Armadillo",    placeholder:true }
];

/* ---------- nice cooking fractions (snaps to eighths & thirds) ---------- */
function niceFrac(x){
  if(!isFinite(x)) return "0";
  var whole=Math.floor(x+1e-9), f=x-whole;
  var opts=[[0,""],[1/8,"1/8"],[1/4,"1/4"],[1/3,"1/3"],[3/8,"3/8"],[1/2,"1/2"],
            [5/8,"5/8"],[2/3,"2/3"],[3/4,"3/4"],[7/8,"7/8"],[1,""]];
  var best=opts[0], bd=Infinity;
  for(var i=0;i<opts.length;i++){var d=Math.abs(f-opts[i][0]); if(d<bd){bd=d;best=opts[i];}}
  if(best[0]===1){whole+=1;best=opts[0];}
  var fs=best[1];
  if(whole===0 && fs==="") return "0";
  if(whole===0) return fs;
  if(fs==="")   return whole.toString();
  return whole+" "+fs;
}

/* ---------- smart measure: roll up to the sensible kitchen unit ----------
   VOLUME ladder (canonical = tsp):  tsp -> Tbsp -> cup -> qt -> gal
   WEIGHT ladder (canonical = oz):   oz  -> lb
   Each ingredient promotes on its own as the batch grows, so 23 Tbsp of
   salt shows as ~1 1/2 cups instead of an un-measurable pile of tablespoons. */
var VOL = {tsp:1, tbsp:3, cup:48, c:48, qt:192, quart:192, gal:768, gallon:768};
var WT  = {oz:1, ounce:1, lb:16, lbs:16, pound:16, pounds:16};

/* snap to nearest quarter (for big-batch cup/qt remainders) */
function niceQuarter(x){
  var whole=Math.floor(x+1e-9), f=x-whole;
  var opts=[[0,""],[0.25,"1/4"],[0.5,"1/2"],[0.75,"3/4"],[1,""]];
  var best=opts[0],bd=Infinity;
  for(var i=0;i<opts.length;i++){var d=Math.abs(f-opts[i][0]); if(d<bd){bd=d;best=opts[i];}}
  if(best[0]===1){whole++;best=opts[0];}
  if(whole===0 && best[1]==="") return "0";
  if(whole===0) return best[1];
  if(best[1]==="") return whole.toString();
  return whole+" "+best[1];
}

/* Cup-range decomposition into REAL measuring tools:
   whole cups + (1/4 | 1/3 | 1/2 | 2/3 | 3/4 cup) + Tbsp + tsp.
   So 3/8 cup -> "1/4 cup + 2 Tbsp", never an un-scoopable fraction.
   dropTsp trims the teaspoon tail when a bigger unit (qt) is already present. */
function cupCombo(canon, dropTsp){
  var whole=Math.floor(canon/48 + 1e-9);
  var rem=canon - whole*48;
  if(Math.abs(rem-16)<=1.2) return (whole>0?whole+" ":"")+"1/3 cup";
  if(Math.abs(rem-32)<=1.2) return (whole>0?whole+" ":"")+"2/3 cup";
  var q=Math.floor(rem/12 + 1e-9); rem-=q*12;           // quarter-cups: 0..3
  var frac=["","1/4","1/2","3/4"][q];
  var out=[];
  if(whole>0 && frac) out.push(whole+" "+frac+" cup");
  else if(whole>0)    out.push(whole+" cup");
  else if(frac)       out.push(frac+" cup");
  var tb=Math.floor(rem/3 + 1e-9); rem-=tb*3;
  if(tb>0) out.push(tb+" Tbsp");
  if(!dropTsp){ var ts=niceQuarter(rem); if(ts!=="0") out.push(ts+" tsp"); }
  return out.length ? out.join(" + ") : "0";
}

/* Returns a ready-to-read measure string built from standard kitchen tools.
   Roll-up ladder: tsp -> Tbsp -> cup -> quart -> gallon. Big batches are kept
   to the 2-3 largest tools so nobody has to count 12 tablespoons. */
function smartMeasure(amount, unit){
  var u=(unit||"").toLowerCase().trim();
  if(VOL.hasOwnProperty(u)){
    var canon = amount * VOL[u];                 // teaspoons
    if(canon < 0.125) return "0";
    if(canon >= 768){                             // gallon scale: gal + qt + cup(1/4)
      var gal=Math.floor(canon/768 + 1e-9), rem=canon-gal*768;
      var qt=Math.floor(rem/192 + 1e-9); rem-=qt*192;
      var cups=niceQuarter(rem/48);
      var out=[gal+" gal"];
      if(qt>0) out.push(qt+" qt");
      if(cups!=="0") out.push(cups+" cup");
      return out.join(" + ");
    }
    if(canon >= 192){                             // quart scale: qt + cups + Tbsp
      var qt2=Math.floor(canon/192 + 1e-9), rem2=canon-qt2*192;
      var tail=cupCombo(rem2, true);              // drop tsp at this scale
      return tail==="0" ? qt2+" qt" : qt2+" qt + "+tail;
    }
    if(canon >= 12) return cupCombo(canon, false);// cup scale: full precision
    if(canon >= 3){                               // Tbsp scale: Tbsp + tsp
      var tb=Math.floor(canon/3 + 1e-9), r=canon-tb*3;
      return r>0.1 ? tb+" Tbsp + "+niceFrac(r)+" tsp" : tb+" Tbsp";
    }
    return niceFrac(canon)+" tsp";
  }
  if(WT.hasOwnProperty(u)){
    var oz = amount * WT[u];
    var lb = Math.floor(oz/16 + 1e-9), rw = oz - lb*16;
    var wout=[];
    if(lb>0) wout.push(lb+" lb");
    if(rw>0.1) wout.push(niceFrac(rw)+" oz");
    return wout.length ? wout.join(" + ") : "0";
  }
  // count / each / unknown -> leave as written
  return niceFrac(amount)+(unit?(" "+unit):"");
}

/* ---------- state ---------- */
var LS = "mikesmeat_scaler_v1";
var state = {last:null, scales:{}};
try{ var raw=localStorage.getItem(LS); if(raw) state=JSON.parse(raw); }catch(e){}
function save(){ try{ localStorage.setItem(LS, JSON.stringify(state)); }catch(e){} }

/* ---------- home ---------- */
function renderHome(){
  var wrap=document.getElementById("recipeList"); wrap.innerHTML="";
  RECIPES.forEach(function(r,i){
    var el=document.createElement("div");
    el.className="rcard"+(r.placeholder?" empty":"");
    if(r.placeholder){
      el.innerHTML='<div class="idx">'+(i+1)+'</div>'+
        '<div class="meta"><h3>'+r.name+'</h3><p>Open slot &mdash; add it later</p></div>'+
        '<div class="arw">+</div>';
    }else{
      el.innerHTML='<div class="idx">'+(i+1)+'</div>'+
        '<div class="meta"><h3>'+r.name+'</h3><p>'+(r.subtitle||"")+'</p></div>'+
        '<div class="arw">&#8250;</div>';
    }
    el.onclick=function(){ openRecipe(r.id); };
    wrap.appendChild(el);
  });
}

/* ---------- recipe ---------- */
var current=null;
function openRecipe(id){
  var r=RECIPES.filter(function(x){return x.id===id;})[0]; if(!r) return;
  current=r; state.last=id; save();
  document.getElementById("rName").textContent=r.name;
  document.getElementById("rSub").textContent=r.placeholder?"Coming soon":(r.subtitle||"");
  var body=document.getElementById("recipeBody");

  if(r.placeholder){
    body.innerHTML='<div class="empty-state"><div class="big">Open Slot</div>'+
      '<p>No recipe here yet. Add it by editing the <code>RECIPES</code> list at the top of this file '+
      '(copy the format of &ldquo;The Original&rdquo;), then re-save it to the home screen.</p></div>';
    showScreen("recipe"); return;
  }

  var scale = state.scales[r.id]!=null ? state.scales[r.id] : r.baseScale;
  var quickBtns = (r.quick||[]).map(function(q){
    return '<button data-q="'+q+'"'+(q===scale?' class="on"':'')+'>'+q+'</button>';
  }).join("");

  body.innerHTML =
    '<div class="scaler">'+
      '<p class="lab">Batch size</p>'+
      '<div class="stepper">'+
        '<button id="minus">&minus;</button>'+
        '<div class="valwrap">'+
          '<input id="scaleIn" inputmode="decimal" value="'+trim(scale)+'">'+
          '<span class="unit">'+(r.scaleLabel||"batches")+'</span>'+
        '</div>'+
        '<button id="plus">+</button>'+
      '</div>'+
      (quickBtns? '<div class="quick" id="quick">'+quickBtns+'</div>':'')+
    '</div>'+
    '<div class="ing-head"><span>Scaled ingredients</span></div>'+
    '<div id="ingList"></div>'+
    (r.notes? '<div class="notes"><div class="k">Prep notes</div>'+r.notes+'</div>':'');

  var input=document.getElementById("scaleIn");
  function setScale(v){
    v=parseFloat(v); if(!isFinite(v)||v<=0) v=r.baseScale;
    state.scales[r.id]=v; save();
    input.value=trim(v);
    renderIngredients(r,v);
    var qs=document.querySelectorAll('#quick button');
    qs.forEach(function(b){ b.classList.toggle('on', parseFloat(b.getAttribute('data-q'))===v); });
  }
  document.getElementById("minus").onclick=function(){ setScale((parseFloat(input.value)||r.baseScale)-(r.step||1)); };
  document.getElementById("plus").onclick =function(){ setScale((parseFloat(input.value)||r.baseScale)+(r.step||1)); };
  input.addEventListener("input",function(){ renderIngredientsSafe(r,input.value); });
  input.addEventListener("change",function(){ setScale(input.value); });
  input.addEventListener("blur",function(){ setScale(input.value); });
  var q=document.getElementById("quick");
  if(q){ q.addEventListener("click",function(e){ var b=e.target.closest('button'); if(b) setScale(b.getAttribute('data-q')); }); }

  renderIngredients(r,scale);
  showScreen("recipe");
}

function renderIngredientsSafe(r,v){ v=parseFloat(v); if(isFinite(v)&&v>0) renderIngredients(r,v); }
function renderIngredients(r,scale){
  var mult = scale / r.baseScale;
  var list=document.getElementById("ingList"); if(!list) return;
  list.innerHTML = r.ingredients.map(function(ing){
    var meas = smartMeasure(ing.amount * mult, ing.unit);
    return '<div class="ing"><span class="meas">'+meas+'</span><span class="nm">'+ing.item+'</span></div>';
  }).join("");
}

function trim(n){ return (Math.round(n*100)/100).toString(); }
function showScreen(id){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}
function goHome(){ showScreen("home"); }

renderHome();
if(state.last){ var r=RECIPES.filter(function(x){return x.id===state.last;})[0]; if(r && !r.placeholder) openRecipe(state.last); }
</script>
</body>
</html>
